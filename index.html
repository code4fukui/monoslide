<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="icon" href="data:">
<title>monoslide</title>
<meta property="og:image" content="./monoslide.png">
<style>
body {
	text-align: center;
	margin: 1em 0;
}
#all {
	text-align: center;
	padding: 20px;
	width: 90vw;
	max-width: 400px;
	margin: auto;
}
#slider {
	width: 90vw;
	max-width: 400px;
}
.num {
	width: 90vw;
	max-width: 400px;
	text-align: center;
	font-size: 50px;
	display: inline-block;
}
.bits {
	user-select: none;
}
.bits > div {
	padding: .1em .2em;
	margin-bottom: .8em;
	border-radius: .3em;
}
.bits .white {
	background: white;
	color: black;
	text-content: 0;
}
.bits .black {
	background: black;
	color: white;
	text-content: 1;
}
/* */
a:link {
	color: #77f;
	text-decoration: none;
}
a:visited {
	color: #33a;
	text-decoration: none;
}
a:hover {
	color: #33a;
	text-decoration: underline;
}
a:active {
	color: #33a;
	text-decoration: underline;
}
#credit {
	margin-top: 40px;
	font-size: 12px;
}
</style>
<script type="module">
const $ = function(id) {
	return document.getElementById(id);
};
const create = function(tag) {
	return document.createElement(tag);
};
let bits;
onload = function() {
	bits = createBits(8, 'mono');
	$('slider').oninput = function() {
		const n = $('slider').value;
		bits.setValue(n);
		$('dec').textContent = n;
		$('hex').textContent = dec2hex(n);
	};
	bits.onchange = function(bits) {
		const n = bits.getValue();
		$('slider').value = n;
		$('dec').textContent = n;
		$('hex').textContent = dec2hex(n);
	};
	document.body.onkeydown = function(e) {
		const key = e.keyCode;
		if (key == 39) { // right
			$('slider').value++;
			$('slider').oninput();
		} else if (key == 37) { // left
			$('slider').value--;
			$('slider').oninput();
		}
	}
	$('slider').value = 100;
	$('slider').oninput();
}
const dec2hex = function(n) {
	let hex = "";
	for (;;) {
		const m = n & 0xf;
		hex = '0123456789abcdef'.charAt(m) + hex;
		n -= m;
		if (n == 0) break;
		n >>= 4;
	}
	return '0x' + hex.toUpperCase();
}
const createBits = function(nbits, id) {
	const div = id == null ? create('div') : $(id);
	div.className = 'bits';
	div.lineHeight = '0px';
	for (let i = 0; i < nbits; i++) {
		const bit = create('div');
		bit.style.display = 'inline-block';
		bit.style.posWidth = 36;
		bit.style.posHeight = 36;
		bit.style.borderWidth = '2px';
		bit.style.borderStyle = 'solid';
		bit.style.borderColor = 'black';
		bit.style.fontSize = '25px';
		bit.style.textAlign = 'center';
		bit.style.cursor = 'pointer';
		bit.className = 'white';
		if (i < nbits - 1)
			bit.style.marginRight = '10px';
		div.appendChild(bit);
		bit.setValue = function(b) {
			this.className = b ? 'black' : 'white';
			this.textContent = b ? '1' : '0';
		};
		bit.getValue = function() {
			return this.className == 'black';
		};
		bit.onmousedown = function() {
			this.setValue(!this.getValue());
			const bits = this.parentElement;
			if (bits.onchange != null) {
				bits.onchange(bits);
			}
		};
		bit.setValue(0);
	}
	div.setValue = function(n) {
		const len = this.childNodes.length;
		for (let i = 0; i < len; i++) {
			const b = (n & (1 << (len - 1 - i))) != 0;
			this.childNodes[i].setValue(b);
		}
	};
	div.getValue = function() {
		const len = this.childNodes.length;
		const n = 0;
		for (let i = 0; i < len; i++) {
			n += this.childNodes[i].getValue() ? (1 << (len - 1 - i)) : 0;
		}
		return n;
	};
	return div;
}
</script>
</head>
<body>
<h1>二進法スライダー</h1>
2進法、10進法、16進法のスライド体感
<div id='all'>
<div id='mono'></div>
<input id='slider' type="range" min="0" max="255"/>
<div class='num' id='dec'></div>
<div class='num' id='hex'></div>
</div>

<a href=https://github.com/code4fukui/monoslide>src on GitHub</a><br>

</body>
</html>
